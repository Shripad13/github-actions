# CI Pipeline (Build + Test)

name: CI Pipeline

on:
  push:
    branches:
      - develop
      - qa
      - staging
      - main

  pull_request:
    branches:
      - develop
      - qa
      - staging
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test

      - name: Build Application
        run: npm run build