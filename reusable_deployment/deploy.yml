# Main Pipeline Calling Reusable Workflow
name: Deploy

on:
  push:
    branches:
      - develop
      - qa
      - staging
      - main

jobs:
  deploy-dev:
    if: github.ref_name == 'develop'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: dev

  deploy-qa:
    if: github.ref_name == 'qa'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: qa

  deploy-staging:
    if: github.ref_name == 'staging'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: staging

  deploy-prod:
    if: github.ref_name == 'main'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      environment: prod